name: Release

on:
  push:
    tags: ['*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (x.y.z)'
        required: true
        default: '0.0.0'

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          cache: true
          modules: ''

      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build
        shell: pwsh
        run: |
          msbuild RLMMToolkit.slnx `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppVersion=${{ steps.ver.outputs.version }} `
            /p:QtInstall=$env:QT_ROOT_DIR `
            /m

      - name: Deploy
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item x64/Release/RLMMToolkit.exe dist/
          windeployqt dist/RLMMToolkit.exe --release --no-translations

      - name: Zip
        shell: pwsh
        run: Compress-Archive dist/* RLMMToolkit-${{ inputs.version || github.ref_name }}.zip

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: exe
          path: RLMMToolkit-*.zip
          if-no-files-found: error

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /DVERSION=${{ inputs.version || github.ref_name }} /DSRCDIR=dist installer.nsi

      - uses: actions/upload-artifact@v6
        with:
          name: installer
          path: RLMMToolkit-*-setup.exe
          if-no-files-found: error

  release:
    needs: [build, installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: '{exe,installer}'
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true