name: Release

on:
  push:
    tags: ['*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (x.y.z)'
        required: true
        default: '0.0.0'

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          cache: true
          modules: ''

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build
        shell: pwsh
        run: |
          msbuild RLMMToolkit.slnx `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:QtInstall=$env:QT_ROOT_DIR `
            /m

      - name: Deploy
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item x64/Release/RLMMToolkit.exe dist/
          windeployqt dist/RLMMToolkit.exe --release --no-translations

      - name: Zip
        shell: pwsh
        run: Compress-Archive dist/* RLMMToolkit-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: zip
          path: RLMMToolkit-*.zip
          if-no-files-found: error

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: repolevedavaj/install-nsis@v1.0.1
        with:
          nsis-version: '3.10'

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Build Installer
        shell: pwsh
        run: |
          $env:PATH += ';C:\Program Files (x86)\NSIS'
          makensis /DVERSION=${{ inputs.version || github.ref_name }} /DSRCDIR=dist installer.nsi

      - uses: actions/upload-artifact@v6
        with:
          name: installer
          path: RLMMToolkit-*-setup.exe
          if-no-files-found: error

  release:
    needs: [build, installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with: { path: artifacts, merge-multiple: true }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true