name: Release

on:
  push:
    tags: ['*.*.*']

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          cache: true
          modules: ''

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: |
          $env:QTDIR = $env:Qt6_DIR   # set by install-qt-action
          msbuild RLMMToolkit.slnx /p:Configuration=Release /p:Platform=x64 /m

      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item x64/Release/RLMMToolkit.exe dist/
          windeployqt dist/RLMMToolkit.exe --release --no-translations
          Compress-Archive dist/* RLMMToolkit-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: RLMMToolkit-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true