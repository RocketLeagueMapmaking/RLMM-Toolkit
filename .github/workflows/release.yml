name: Release

on:
  push:
    tags: ['*.*.*']

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          cache: true
          modules: ''

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: |
          msbuild RLMMToolkit.slnx `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:QtInstall=$env:QT_ROOT_DIR `
            /m

      - name: Stage deployable
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item x64/Release/RLMMToolkit.exe dist/
          windeployqt dist/RLMMToolkit.exe --release --no-translations

      - name: Zip
        shell: pwsh
        run: Compress-Archive dist/* RLMMToolkit-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: zip
          path: RLMMToolkit-*.zip
          if-no-files-found: error

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: joncloud/makensis-action@v4

      - name: Build installer
        shell: pwsh
        run: makensis /DVERSION=${{ github.ref_name }} /DSRCDIR=dist installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: RLMMToolkit-*-setup.exe
          if-no-files-found: error

  release:
    needs: [build, installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RLMMToolkit-*.zip
            artifacts/RLMMToolkit-*-setup.exe
          generate_release_notes: true